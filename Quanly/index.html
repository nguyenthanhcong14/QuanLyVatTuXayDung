<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Cung Ứng Vật Tư - Nhóm 10</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 260px; --primary: #0d6efd; --dark-bg: #001529; }
        body { background: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--dark-bg); color: white; position: fixed; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .nav-link { color: #a6adb4; padding: 15px 25px; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-link:hover, .nav-link.active { background: #112a45; color: white; border-left-color: var(--primary); }
        .sidebar-brand { padding: 30px 25px; font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #1d3954; }

        /* Main Content */
        .main { margin-left: var(--sidebar-width); padding: 40px; transition: 0.3s; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .table thead { background: #f8f9fa; }
        .table th { border-top: none; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; color: #6c757d; }
        
        /* Status Badge */
        .badge-qty { background: #e7f1ff; color: #0d6efd; font-weight: 600; padding: 5px 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"><i class="bi bi-box-seam-fill me-2"></i>VẬT TƯ XÂY DỰNG</div>
    <div class="nav flex-column mt-3">
        <a class="nav-link active" onclick="switchTab('vattu', this)"><i class="bi bi-stack me-3"></i>Vật Tư</a>
        <a class="nav-link" onclick="switchTab('kho', this)"><i class="bi bi-door-open me-3"></i>Kho Hàng</a>
        <a class="nav-link" onclick="switchTab('ton-kho', this)"><i class="bi bi-box-fill me-3"></i>Tồn Kho</a>
        <a class="nav-link" onclick="switchTab('ncc', this)"><i class="bi bi-truck me-3"></i>Nhà Cung Cấp</a>
        <a class="nav-link" onclick="switchTab('nhan-vien', this)"><i class="bi bi-person-badge me-3"></i>Nhân Viên</a>
        <a class="nav-link" onclick="switchTab('cong-trinh', this)"><i class="bi bi-buildings me-3"></i>Công Trình</a>
    </div>
</div>

<div class="main">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 id="viewTitle" class="fw-bold">Danh mục Vật Tư</h2>
            <p class="text-muted mb-0">Hệ thống quản lý dữ liệu cung ứng thời gian thực</p>
        </div>
        <button class="btn btn-primary px-4 py-2" onclick="showAddModal()">
            <i class="bi bi-plus-lg me-2"></i>Thêm Mới
        </button>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header border-bottom-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Thêm mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-0">
                <form id="dynamicForm" class="row g-3"></form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary px-4" onclick="saveData()">Lưu dữ liệu</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = 'http://localhost:3000/api';
    let currentTable = 'vattu';
    const modal = new bootstrap.Modal(document.getElementById('formModal'));

    const config = {
        'vattu': { pk: 'MaVT', fields: ['MaVT', 'TenVT', 'DonVi', 'LoaiVT'], labels: ['Mã VT', 'Tên Vật Tư', 'Đơn Vị', 'Loại VT'] },
        'kho': { pk: 'MaKHO', fields: ['MaKHO', 'TenKHO', 'DiaChi'], labels: ['Mã Kho', 'Tên Kho', 'Địa Chỉ'] },
        'ton-kho': { pk: 'composite', fields: ['MaKHO', 'MaVT', 'SoLuong'], labels: ['Mã Kho', 'Mã Vật Tư', 'Số Lượng Tồn'] },
        'ncc': { pk: 'MaNCC', fields: ['MaNCC', 'TenNCC', 'DiaChi', 'Email'], labels: ['Mã NCC', 'Tên NCC', 'Địa Chỉ', 'Email'] },
        'nhan-vien': { pk: 'MaNV', fields: ['MaNV', 'TenNV', 'GioiTinh', 'NamSinh', 'DiaChi'], labels: ['Mã NV', 'Họ Tên', 'Giới Tính', 'Năm Sinh', 'Địa Chỉ'] },
        'cong-trinh': { pk: 'MaCT', fields: ['MaCT', 'TenCT', 'DiaDiem'], labels: ['Mã CT', 'Tên Công Trình', 'Địa Điểm'] }
    };

    async function loadData() {
        const res = await fetch(`${API}/${currentTable}`);
        const data = await res.json();
        const cfg = config[currentTable];

        document.getElementById('tableHead').innerHTML = `<tr>${cfg.labels.map(l => `<th>${l}</th>`).join('')}<th>Hành động</th></tr>`;
        
        document.getElementById('tableBody').innerHTML = data.map(item => {
            const sid = currentTable === 'ton-kho' ? `${item.MaKHO}_${item.MaVT}` : item[cfg.pk];
            return `<tr>
                ${cfg.fields.map(f => f === 'SoLuong' ? `<td><span class="badge-qty">${item[f]}</span></td>` : `<td>${item[f]}</td>`).join('')}
                <td>
                    <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteData('${sid}')">
                        <i class="bi bi-trash3"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    function switchTab(table, el) {
        currentTable = table;
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('viewTitle').innerText = 'Danh mục ' + el.innerText.trim();
        loadData();
    }

    function showAddModal() {
        const cfg = config[currentTable];
        document.getElementById('dynamicForm').innerHTML = cfg.fields.map((f, i) => `
            <div class="col-12">
                <label class="form-label fw-semibold text-secondary small">${cfg.labels[i]}</label>
                <input type="text" id="${f}" class="form-control bg-light border-0 py-2">
            </div>`).join('');
        modal.show();
    }

    async function saveData() {
        const body = {};
        config[currentTable].fields.forEach(f => body[f] = document.getElementById(f).value);
        await fetch(`${API}/${currentTable}`, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(body) 
        });
        modal.hide(); loadData();
    }

    async function deleteData(id) {
        if(confirm("Bạn có chắc chắn muốn xóa dòng dữ liệu này?")) {
            await fetch(`${API}/${currentTable}/${id}`, { method: 'DELETE' });
            loadData();
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
